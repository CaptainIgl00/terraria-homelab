apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terraria
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CaptainIgl00/terraria-homelab.git
    targetRevision: main
    path: apps/terraria/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: terraria
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
