apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: terraria
  namespace: terraria
spec:
  serviceName: terraria
  replicas: 1
  selector:
    matchLabels:
      app: terraria
  template:
    metadata:
      labels:
        app: terraria
    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: terraria
          image: beardedio/terraria:latest
          imagePullPolicy: IfNotPresent
          # beardedio/terraria run en root lors de l'init
          securityContext:
            privileged: false
          # Le password est passé en CLI arg depuis le secret
          args:
            - "-pass"
            - "$(PASSWORD)"
          ports:
            - containerPort: 7777
              name: game
              protocol: TCP
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: terraria-secret
                  key: PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 90
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /config
            - name: serverconfig
              mountPath: /config/serverconfig.txt
              subPath: serverconfig.txt

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: terraria-data
        - name: serverconfig
          configMap:
            name: terraria-serverconfig
